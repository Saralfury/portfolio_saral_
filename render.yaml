# Render Blueprint — deploys all 3 FastAPI backends as separate Web Services.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Project 1: Real-Time Fraud & Risk Engine ────────────────────────────────
  - type: web
    name: risk-engine
    env: python
    rootDir: risk-engine
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free

  # ── Project 2: Smart-Budget Semantic Router ─────────────────────────────────
  - type: web
    name: semantic-router
    env: python
    rootDir: semantic-router
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free

  # ── Project 3: AI Health Monitor ─────────────────────────────────────────────
  - type: web
    name: ai-health-monitor
    env: python
    rootDir: ai-health-monitor
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
